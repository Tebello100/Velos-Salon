<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salon — Sign In</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: sans-serif;
      background: #1a0533;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #2d0a5e;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }

    h1 { color: #f5c518; margin-bottom: 1.5rem; text-align: center; }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      border-radius: 8px;
      border: 1px solid #5a1f9e;
      background: #1a0533;
      color: #fff;
      font-size: 1rem;
    }

    button {
      width: 100%;
      padding: 0.75rem;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      margin-bottom: 0.75rem;
      font-weight: 500;
    }

    .btn-primary { background: #f5c518; color: #1a0533; }
    .btn-secondary { background: transparent; color: #f5c518; border: 1px solid #f5c518; }

    .message {
      text-align: center;
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 8px;
      display: none;
    }

    .message.error { background: #5a1010; color: #ff6b6b; display: block; }
    .message.success { background: #0a3a1a; color: #6bff9e; display: block; }

    .welcome {
      text-align: center;
      display: none;
    }

    .welcome h2 { color: #f5c518; margin-bottom: 1rem; }
    .btn-signout { background: #f5c518; color: #1a0533; }
  </style>
</head>
<body>

  <div class="card">

    <!-- Auth Form (shown when logged out) -->
    <div id="authSection">
      <h1>Glamour Salon</h1>

      <input type="email" id="email" placeholder="Email address">
      <input type="password" id="password" placeholder="Password">

      <button class="btn-primary" onclick="signUp()">Create account</button>
      <button class="btn-secondary" onclick="signIn()">Sign in</button>

      <div class="message" id="message"></div>
    </div>

    <!-- Welcome (shown when logged in) -->
    <div class="welcome" id="welcomeSection">
      <h2>Welcome back!</h2>
      <p id="userEmail" style="color: #ccc; margin-bottom: 1.5rem;"></p>
      <button class="btn-signout" onclick="signOut()">Sign out</button>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // 🔧 Replace this with your actual Firebase config
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // --- Helper: show a message to the user ---
    function showMessage(text, type) {
      const el = document.getElementById("message");
      el.textContent = text;
      el.className = `message ${type}`;
    }

    // --- Sign Up ---
    window.signUp = async () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        await createUserWithEmailAndPassword(auth, email, password);
        showMessage("Account created! You're now signed in.", "success");
      } catch (error) {
        showMessage(error.message, "error");
      }
    };

    // --- Sign In ---
    window.signIn = async () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        showMessage("Signed in successfully!", "success");
      } catch (error) {
        showMessage(error.message, "error");
      }
    };

    // --- Sign Out ---
    window.signOut = async () => {
      await signOut(auth);
    };

    // --- Auth state listener ---
    // This runs automatically whenever the user signs in or out
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // User is signed in — show welcome screen
        document.getElementById("authSection").style.display = "none";
        document.getElementById("welcomeSection").style.display = "block";
        document.getElementById("userEmail").textContent = user.email;
      } else {
        // User is signed out — show auth form
        document.getElementById("authSection").style.display = "block";
        document.getElementById("welcomeSection").style.display = "none";
      }
    });
  </script>

</body>
</html>
