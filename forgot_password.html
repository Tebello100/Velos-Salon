<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velo's Salon - Reset password</title>
    <link rel="stylesheet" href="styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink:wght@100..900&family=Cinzel:wght@400..900&family=Happy+Monkey&family=Orbitron:wght@400..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Sora:wght@100..800&display=swap" rel="stylesheet">
</head>
<body>
    <h1 class="update-passord-heading">Reset Your Password</h1>
    <div id="message"></div>
    <form>
        <div class="forgot-password-form">
            <div>
                <label for="user-email">Email Address</label>
                <input type="email" name="email" id="emailAddress">
            </div>
        </div>
        <button type="button" class="reset-button" id="resetButton">Reset Password</button>
    </form>
    <script type="module" src="reset.js"></script>
</body>
</html>
